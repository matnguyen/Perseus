package:
  name: perseus
  version: 1.0.0

source:
  path: ..

build:
  noarch: python
  script: |
    {{ PYTHON }} -m pip install . -vv --no-deps

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - setuptools
  run:
    - python >=3.10,<3.13
    - numpy
    - pandas
    - pytorch
    - scikit-learn
    - ete3
    - pyarrow
    - alive-progress

test:
  requires:
    - pytest
  commands:
    - perseus -h

about:
  summary: "Perseus: Lineage-aware Kraken2 refinement for long-read metagenomics"
  license: MIT