name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  PACKAGE_NAME: perseus
  CONDA_RECIPE_DIR: conda.recipe
  DOCKER_IMAGE_NAME: perseus

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest build

      - name: Run tests
        run: pytest

  build-python:
    name: Build Python package
    runs-on: ubuntu-latest
    needs: test

    outputs:
      version: ${{ steps.version.outputs.version }}
      raw_tag: ${{ steps.version.outputs.raw_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute version from release tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"

          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          echo "Release tag: $RAW_TAG"
          echo "Package version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-python

    environment:
      name: pypi
      url: https://pypi.org/p/${{ env.PACKAGE_NAME }}

    permissions:
      id-token: write

    steps:
      - name: Download built Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-conda:
    name: Build and upload Conda package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute version from release tag
        shell: bash
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"

          echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          echo "Release tag: $RAW_TAG"
          echo "Conda version: $VERSION"

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-variant: Miniforge3
          activate-environment: conda-build-env
          auto-activate-base: false
          python-version: "3.12"

      - name: Install conda-build tools
        shell: bash -l {0}
        run: |
          conda install -y conda-build anaconda-client

      - name: Build conda package
        shell: bash -l {0}
        env:
          PKG_VERSION: ${{ env.VERSION }}
        run: |
          conda build "${CONDA_RECIPE_DIR}" --output-folder conda-dist

      - name: Show built conda packages
        shell: bash -l {0}
        run: find conda-dist -type f

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-dist
          path: conda-dist/**/*

      - name: Upload to Anaconda.org
        shell: bash -l {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          find conda-dist -name "*.tar.bz2" -o -name "*.conda" | while read -r pkg; do
            anaconda -t "$ANACONDA_API_TOKEN" upload --skip-existing "$pkg"
          done

  publish-docker:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute version from release tag
        id: version
        shell: bash
        run: |
          RAW_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RAW_TAG#v}"

          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "RAW_TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}